name: publish-image

# Builds the openstack-helm / airship cinder-backup image (ci/Dockerfile)
# and pushes it to GitHub Container Registry. Kolla users build their own
# image with kolla-build; this published image is for the helm path (and
# works as a kolla base too).
#
# Triggers: version tags (v*) and manual dispatch. PRs only build, no push
# (see the ci workflow).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      cinder_base_image:
        description: "Base cinder image to build on"
        default: "quay.io/airshipit/cinder:2026.1-ubuntu_noble"

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    env:
      CINDER_BASE_IMAGE: ${{ inputs.cinder_base_image || 'quay.io/airshipit/cinder:2026.1-ubuntu_noble' }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=sha,prefix=,enable=${{ github.ref_type != 'tag' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ci/Dockerfile
          build-args: |
            CINDER_IMAGE=${{ env.CINDER_BASE_IMAGE }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
